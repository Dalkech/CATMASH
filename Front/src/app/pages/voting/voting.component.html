@if (loading()) {
  <p>Loading cats...</p>
} @else if (catImage1() && catImage2()) {
  <div class="voting-container">
    <h2>Which cat is cuter?</h2>
    <div class="cat-pair">
      <div class="cat-card">
        <img [src]="catImage1()?.url" [alt]="'Cat ' + catImage1()?.id" />
        <button (click)="vote(catImage1()!.id, catImage2()!.id)">Vote for this cat</button>
      </div>
      <div class="cat-card">
        <img [src]="catImage2()?.url" [alt]="'Cat ' + catImage2()?.id" />
        <button (click)="vote(catImage2()!.id, catImage1()!.id)">Vote for this cat</button>
      </div>
    </div>
  </div>
} @else {
  <p>Not enough cats to vote on. Please try again later.</p>
}
